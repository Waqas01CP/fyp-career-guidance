version: "3.8"

services:
  db:
    image: postgres:15
    container_name: fyp_postgres
    environment:
      POSTGRES_USER: fyp_user
      POSTGRES_PASSWORD: fyp_password
      POSTGRES_DB: fyp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fyp_user -d fyp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
